openapi: 3.1.0
info:
  title: Mustashar AI API
  version: 1.0.0
  description: API specification for Mustashar AI - Legal Consultation Platform
servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health check operations
  - name: auth
    description: Authentication operations
  - name: conversations
    description: Chat conversation operations
  - name: messages
    description: Message operations
  - name: admin
    description: Admin panel operations

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        balance:
          type: integer
          description: Credit balance
        isAdmin:
          type: boolean
      required:
        - id
        - name
        - email
        - balance
        - isAdmin

    Conversation:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        personaType:
          type: string
          enum:
            - defense-lawyer
            - legal-analyst
            - judge-vision
            - quick-consultation
            - smart-mufti
        messageCount:
          type: integer
        totalCreditsUsed:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - title
        - personaType
        - messageCount
        - totalCreditsUsed
        - createdAt
        - updatedAt

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum:
            - user
            - assistant
        content:
          type: string
        creditsUsed:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - creditsUsed
        - createdAt

    Transaction:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: integer
        type:
          type: string
          enum:
            - deposit
            - debit
            - refund
            - admin-credit
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - amount
        - type
        - createdAt

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
              required:
                - name
                - email
                - password
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  token:
                    type: string
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
                - email
                - password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  token:
                    type: string
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/me:
    post:
      operationId: getCurrentUser
      tags: [auth]
      security:
        - BearerAuth: []
      summary: Get current user information
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      security:
        - BearerAuth: []
      summary: Get all conversations for current user
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      operationId: createConversation
      tags: [conversations]
      security:
        - BearerAuth: []
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                personaType:
                  type: string
                  enum:
                    - defense-lawyer
                    - legal-analyst
                    - judge-vision
                    - quick-consultation
                    - smart-mufti
              required:
                - title
                - personaType
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      security:
        - BearerAuth: []
      summary: Get a conversation with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: "#/components/schemas/Conversation"
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      operationId: deleteConversation
      tags: [conversations]
      security:
        - BearerAuth: []
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /messages:
    post:
      operationId: sendMessage
      tags: [messages]
      security:
        - BearerAuth: []
      summary: Send a message to a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: integer
                content:
                  type: string
              required:
                - conversationId
                - content
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  userMessage:
                    $ref: "#/components/schemas/Message"
                  aiMessage:
                    $ref: "#/components/schemas/Message"
                  newBalance:
                    type: integer
        "402":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /messages/{conversationId}:
    get:
      operationId: listMessages
      tags: [messages]
      security:
        - BearerAuth: []
      summary: Get all messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      security:
        - BearerAuth: []
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/users/{id}:
    get:
      operationId: getAdminUser
      tags: [admin]
      security:
        - BearerAuth: []
      summary: Get user details with transactions (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"

  /admin/users/{id}/credit:
    post:
      operationId: addUserCredit
      tags: [admin]
      security:
        - BearerAuth: []
      summary: Add credits to user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  minimum: 1
                description:
                  type: string
              required:
                - amount
      responses:
        "200":
          description: Credit added
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  transaction:
                    $ref: "#/components/schemas/Transaction"

  /admin/users/{id}/debit:
    post:
      operationId: debitUserCredit
      tags: [admin]
      security:
        - BearerAuth: []
      summary: Debit credits from user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
                  minimum: 1
                description:
                  type: string
              required:
                - amount
      responses:
        "200":
          description: Credit debited
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  transaction:
                    $ref: "#/components/schemas/Transaction"

  /admin/transactions:
    get:
      operationId: listAdminTransactions
      tags: [admin]
      security:
        - BearerAuth: []
      summary: List all transactions (admin only)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /admin/users/{id}/toggle-active:
    post:
      operationId: toggleUserActive
      tags: [admin]
      security:
        - BearerAuth: []
      summary: Toggle user active status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
