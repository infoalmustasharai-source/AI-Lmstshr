# This file is used by Render to deploy the application
services:
  - type: web
    name: ai-lmstshr-api
    env: node
    region: frankfurt
    plan: starter
    buildCommand: cd artifacts/api-server && pnpm install && pnpm run build
    startCommand: cd artifacts/api-server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: bishoysamy390@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
