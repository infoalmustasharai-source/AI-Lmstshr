kind = "web"
previewPath = "/"
title = "المستشار AI"
version = "1.0.0"
id = "artifacts/al-mustashar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24581

[services.development]
run = "pnpm --filter @workspace/al-mustashar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/al-mustashar", "run", "build" ]
publicDir = "artifacts/al-mustashar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24581"
BASE_PATH = "/"
